<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Design</title>

    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 300px;
            margin: 50px auto; 
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px; 
            background-color: rgb(255, 255, 255);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h2 {
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .card p {
            margin-bottom: 15px;
            color: #555;
        }

        .card button {
            padding: 10px 15px;
            border: none;
            background-color: #040404;
            color: rgb(255, 254, 254);
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        
       <img src="225ed64777b68c6108f4894f3da7c662.jpg" alt="ai image"
        <h2>card</h2>
        <p>This is a simple card using the CSS box model with proper spacing.</p>
        <button>Read More</button>
    </div>

</body>
</html>
